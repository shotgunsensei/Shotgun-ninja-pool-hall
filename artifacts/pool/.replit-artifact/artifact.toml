kind = "web"
previewPath = "/"
title = "LAN Pool Lite"
version = "1.0.0"
id = "artifacts/pool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24823

[services.development]
run = "pnpm --filter @workspace/pool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pool", "run", "build" ]
publicDir = "artifacts/pool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24823"
BASE_PATH = "/"
